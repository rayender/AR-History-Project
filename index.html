<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AR Building Viewer</title>

  <!-- =============================================
       model-viewer by Google — handles AR on iOS
       (AR Quick Look) and Android (WebXR / Scene Viewer)
       ============================================= -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Tokens ───────────────────────────────── */
    :root {
      --bg:          #0f0f0e;
      --surface:     #1a1917;
      --border:      rgba(255,255,255,0.08);
      --text:        #f0ece4;
      --muted:       rgba(240,236,228,0.45);
      --accent:      #c8a96e;        /* warm gold */
      --accent-dim:  rgba(200,169,110,0.15);
      --before-col:  #6e8fc8;        /* cool blue  */
      --after-col:   #c8a96e;        /* warm gold  */
      --radius:      14px;
      --transition:  0.35s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── model-viewer fills the screen ─────────── */
    model-viewer {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background-color: var(--bg);
      --poster-color: transparent;
    }

    /* ── Override the built-in AR button ───────── */
    model-viewer::part(default-ar-button) {
      display: none; /* we use our own AR button */
    }

    /* ── Top bar ────────────────────────────────── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: env(safe-area-inset-top, 16px) 20px 0;
      padding-top: calc(env(safe-area-inset-top, 0px) + 18px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .project-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(18px, 4vw, 26px);
      letter-spacing: 0.04em;
      color: var(--text);
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      line-height: 1.1;
    }

    .project-title span {
      display: block;
      font-size: 0.55em;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2px;
    }

    /* ── Bottom controls ────────────────────────── */
    .controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 20px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ── Before / After pill toggle ─────────────── */
    .toggle-pill {
      background: rgba(15,15,14,0.7);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px;
      display: flex;
      gap: 4px;
      width: fit-content;
    }

    .toggle-pill button {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: 999px;
      padding: 10px 28px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), box-shadow var(--transition);
      background: transparent;
      color: var(--muted);
      position: relative;
    }

    .toggle-pill button.active-before {
      background: var(--before-col);
      color: #fff;
      box-shadow: 0 0 20px rgba(110,143,200,0.4);
    }

    .toggle-pill button.active-after {
      background: var(--after-col);
      color: #1a1610;
      box-shadow: 0 0 20px rgba(200,169,110,0.45);
    }

    /* ── Bottom action row ──────────────────────── */
    .action-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-ar {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 30px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #1a1610;
      box-shadow: 0 4px 24px rgba(200,169,110,0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-ar:active { transform: scale(0.96); }

    .btn-ar svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    .hint {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-align: center;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    }

    /* ── State label badge ──────────────────────── */
    .state-badge {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(36px, 10vw, 72px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.3s cubic-bezier(.34,1.56,.64,1);
      text-shadow: 0 4px 40px rgba(0,0,0,0.8);
      z-index: 20;
    }

    .state-badge.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .state-badge.before { color: var(--before-col); }
    .state-badge.after  { color: var(--after-col);  }

    /* ── Loading spinner ─────────────────────────── */
    .loading-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--before-col), var(--after-col));
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 0.4s ease, opacity 0.4s ease;
      z-index: 99;
      opacity: 0;
    }

    .loading-bar.active {
      opacity: 1;
      animation: loadpulse 1.2s ease-in-out infinite;
    }

    @keyframes loadpulse {
      0%   { transform: scaleX(0.05); }
      50%  { transform: scaleX(0.8);  }
      100% { transform: scaleX(0.05); }
    }

    /* ── No-model placeholder ──────────────────── */
    .no-model-msg {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 32px;
      pointer-events: none;
      z-index: 5;
    }

    .no-model-msg .icon { font-size: 48px; opacity: 0.3; }
    .no-model-msg p { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 280px; }

    /* ── AR not supported notice ─────────────────── */
    .ar-unavail {
      display: none;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 240px;
    }
  </style>
</head>
<body>

  <!-- Loading bar -->
  <div class="loading-bar" id="loadingBar"></div>

  <!-- State flash badge -->
  <div class="state-badge" id="stateBadge"></div>

  <!-- =============================================
       TOP BAR — edit project name below
       ============================================= -->
  <div class="top-bar">
    <div class="project-title">
      <span>AR Viewer</span>
      Building Name <!-- ✏️ Change this to your project name -->
    </div>
  </div>

  <!-- =============================================
       3D / AR VIEWER
       ✏️ Replace before.glb and after.glb with your
          actual file paths or hosted URLs.
       ============================================= -->
  <model-viewer
    id="viewer"
    src="before.glb"
    alt="Building 3D model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1.2"
    shadow-softness="0.8"
    exposure="1"
    auto-rotate
    auto-rotate-delay="3000"
    rotation-per-second="12deg"
  ></model-viewer>

  <!-- No-model placeholder (shown if .glb files aren't loaded) -->
  <div class="no-model-msg" id="noModelMsg">
    <div class="icon">🏛️</div>
    <p>Replace <strong>before.glb</strong> and <strong>after.glb</strong> in the HTML with your model file paths to get started.</p>
  </div>

  <!-- =============================================
       BOTTOM CONTROLS
       ============================================= -->
  <div class="controls">

    <div class="hint" id="hintText">Drag to orbit · Pinch to zoom</div>

    <!-- Before / After toggle -->
    <div class="toggle-pill" role="group" aria-label="Toggle building state">
      <button id="btnBefore" class="active-before" onclick="setModel('before')">Before</button>
      <button id="btnAfter"  onclick="setModel('after')">After</button>
    </div>

    <!-- AR launch -->
    <div class="action-row">
      <button class="btn-ar" id="arBtn" onclick="launchAR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        View in AR
      </button>
    </div>

    <p class="ar-unavail" id="arUnavail">
      AR requires iOS 12+ Safari or Android Chrome with ARCore. Desktop browsers show 3D only.
    </p>

  </div>

  <script>
    // =============================================
    // ✏️ FILE PATHS — update these two lines with
    //    your actual .glb file paths or hosted URLs
    // =============================================
    const MODELS = {
      before: 'before.glb',   // ← your BEFORE model
      after:  'after.glb'     // ← your AFTER model
    };

    // ── State ────────────────────────────────────
    let current = 'before';

    const viewer      = document.getElementById('viewer');
    const btnBefore   = document.getElementById('btnBefore');
    const btnAfter    = document.getElementById('btnAfter');
    const stateBadge  = document.getElementById('stateBadge');
    const loadingBar  = document.getElementById('loadingBar');
    const arBtn       = document.getElementById('arBtn');
    const arUnavail   = document.getElementById('arUnavail');
    const hintText    = document.getElementById('hintText');
    const noModelMsg  = document.getElementById('noModelMsg');

    // ── Check AR support ─────────────────────────
    viewer.addEventListener('load', () => {
      noModelMsg.style.display = 'none';
      loadingBar.classList.remove('active');

      const canAR = viewer.canActivateAR;
      arBtn.style.display   = canAR ? '' : 'none';
      arUnavail.style.display = canAR ? 'none' : 'block';
    });

    viewer.addEventListener('progress', (e) => {
      loadingBar.classList.add('active');
    });

    viewer.addEventListener('error', () => {
      loadingBar.classList.remove('active');
    });

    // ── Toggle model ─────────────────────────────
    function setModel(state) {
      if (current === state) return;
      current = state;

      // Swap src
      loadingBar.classList.add('active');
      viewer.src = MODELS[state];

      // Button styles
      btnBefore.className = state === 'before' ? 'active-before' : '';
      btnAfter.className  = state === 'after'  ? 'active-after'  : '';

      // Flash badge
      stateBadge.className = 'state-badge ' + state;
      stateBadge.textContent = state === 'before' ? 'Before' : 'After';
      stateBadge.classList.add('show');
      setTimeout(() => stateBadge.classList.remove('show'), 1400);
    }

    // ── AR launch ─────────────────────────────────
    function launchAR() {
      viewer.activateAR();
    }

    // ── AR session hint ───────────────────────────
    viewer.addEventListener('ar-status', (e) => {
      if (e.detail.status === 'session-started') {
        hintText.textContent = 'Point at a flat surface to place the building';
      } else if (e.detail.status === 'not-presenting') {
        hintText.textContent = 'Drag to orbit · Pinch to zoom';
      }
    });
  </script>

</body>
</html>
